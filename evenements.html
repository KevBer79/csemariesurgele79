<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Événements – CSE Marie Surgelés 79</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/logo-cse.png" alt="Logo CSE Marie Surgelés 79">
    </div>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="actualites.html">Actualités</a>
        <a href="avantages.html" class="active">Avantages</a>
        <a href="contact.html">Contact</a>
        <a href="decouverte.html">Découverte</a>
    </nav>
</header>

<section class="evenements">
    <h1>Événements du CSE</h1>
    <p>Retrouvez ici les événements à venir ainsi que les moments forts passés.</p>

    <h2>À venir</h2>
    <div id="events-future" class="events-grid"></div>

    <h2>Événements passés</h2>
    <div id="events-past" class="events-grid"></div>
</section>

<footer>
    <p>CSE Marie Surgelés 79 — © 2026</p>
    <a href="mentions-legales.html" class="footer-link">Mentions légales</a>
    <a href="https://wa.me/[NUMERO]" class="footer-link whatsapp">WhatsApp</a>
</footer>

<script>
    fetch("evenements.json")
        .then(response => response.json())
        .then(data => {

            const futureContainer = document.getElementById("events-future");
            const pastContainer = document.getElementById("events-past");

            // Fonction de création de card
            function createCard(event) {
                const card = document.createElement("div");
                card.classList.add("event-card");

                let actions = "";

                if (event.document) {
                    actions += `
                        <a class="btn" href="${event.document}" target="_blank">
                            ${event.libelleDocument || "Télécharger"}
                        </a>
                    `;
                }

                if (event.photos) {
                    actions += `
                        <a class="btn secondary" href="${event.photos}" target="_blank">
                            Voir les photos
                        </a>
                    `;
                }

                card.innerHTML = `
                    <h3>${event.icone ? event.icone + " " : ""}${event.titre}</h3>
                    <p class="date"><strong>Date :</strong> ${event.date}</p>
                    <p>${event.description}</p>
                    ${actions ? `<div class="event-actions">${actions}</div>` : ""}
                `;

                return card;
            }

            // Événements à venir
            data.a_venir.forEach(event => {
                futureContainer.appendChild(createCard(event));
            });

            // Événements passés
            data.passes.forEach(event => {
                pastContainer.appendChild(createCard(event));
            });
        });
</script>

</body>
</html>
