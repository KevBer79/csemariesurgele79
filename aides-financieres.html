<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aides financières – CSE Marie Surgelés 79</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/logo-cse.png" alt="Logo CSE Marie Surgelés 79">
    </div>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="actualites.html">Actualités</a>
        <a href="avantages.html" class="active">Avantages</a>
        <a href="contact.html">Contact</a>
        <a href="decouverte.html">Découverte</a>
    </nav>
</header>

<section class="aides">
    <h1>Aides financières du CSE</h1>
    <p>Le CSE propose plusieurs dispositifs d’aides selon votre situation personnelle et familiale.</p>

    <div id="aides-container"></div>
</section>

<footer>
    <p>CSE Marie Surgelés 79 — © 2026</p>
    <a href="mentions-legales.html" class="footer-link">Mentions légales</a>
</footer>

<script>
    fetch("aides-financieres.json")
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("aides-container");

            data.forEach(aide => {
                const card = document.createElement("div");
                card.classList.add("aide-card");

                let actionsHtml = "";

                if (aide.document) {
                    actionsHtml += `
                        <a class="btn" href="${aide.document}" target="_blank">
                            ${aide.libelleDocument || "Télécharger le document"}
                        </a>
                    `;
                }

                if (aide.lienExterne) {
                    actionsHtml += `
                        <a class="btn secondary" href="${aide.lienExterne}" target="_blank">
                            ${aide.libelleLien || "Voir le site du partenaire"}
                        </a>
                    `;
                }

                card.innerHTML = `
                    <h3>${aide.icone ? aide.icone + " " : ""}${aide.titre}</h3>
                    <p>${aide.description}</p>

                    ${aide.periode ? `
                    <p class="periode"><strong>Période :</strong> ${aide.periode}</p>
                ` : ""}

    ${aide.details ? `<p class="details">${aide.details}</p>` : ""}

    ${actionsHtml ? `<div class="aide-actions">${actionsHtml}</div>` : ""}
`;


                container.appendChild(card);
            });
        });
</script>

</body>
</html>
