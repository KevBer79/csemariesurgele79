<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billetterie – CSE Marie Surgelé 79</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/logo-cse.png" alt="Logo CSE">
    </div>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="actualites.html">Actualités</a>
        <a href="avantages.html" class="active">Avantages</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="billetterie">
    <h1>Billetterie du CSE</h1>
    <p>Choisissez une catégorie pour découvrir les tarifs disponibles.</p>

    <!-- BOUTON BON DE COMMANDE -->
    <a href="documents/bon-de-commande-billetterie.pdf" class="btn" target="_blank">
        Télécharger le bon de commande
    </a>

    <!-- FILTRES -->
    <div id="categories" class="categories"></div>

    <!-- OFFRES -->
    <div id="billetterie-container" class="billetterie-grid"></div>
</section>

<footer>
    <p>CSE Marie Surgelé 79 — © 2024</p>
</footer>

<script>
    let offres = [];
    let categorieActive = "Toutes";

    fetch("billetterie.json")
        .then(response => response.json())
        .then(data => {
            offres = data;
            genererCategories();
            afficherOffres();
        });

    function genererCategories() {
        const container = document.getElementById("categories");
        const categories = ["Toutes", ...new Set(offres.map(o => o.categorie))];

        categories.forEach(cat => {
            const btn = document.createElement("button");
            btn.textContent = cat;
            btn.classList.add("cat-btn");
            if (cat === "Toutes") btn.classList.add("active");

            btn.addEventListener("click", () => {
                document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                categorieActive = cat;
                afficherOffres();
            });

            container.appendChild(btn);
        });
    }

    function afficherOffres() {
        const container = document.getElementById("billetterie-container");
        container.innerHTML = "";

        const filtres = categorieActive === "Toutes"
            ? offres
            : offres.filter(o => o.categorie === categorieActive);

        filtres.forEach(offre => {
            const card = document.createElement("div");
            card.classList.add("billet-card");

        card.innerHTML = `
            <img src="${offre.image}" alt="${offre.titre}">
            <h3>${offre.titre}</h3>
            <p>${offre.description}</p>
            <p class="prix">${offre.prix}</p>
            <a class="btn" href="${offre.lien}" target="_blank">Voir le site</a>
            `;


            container.appendChild(card);
        });
    }
</script>

</body>
</html>
