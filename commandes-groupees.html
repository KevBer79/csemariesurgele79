<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commandes Groupées – CSE Marie Surgelé 79</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">
        <img src="images/logo-cse.png" alt="Logo CSE">
    </div>
    <nav>
        <a href="index.html">Accueil</a>
        <a href="actualites.html">Actualités</a>
        <a href="avantages.html" class="active">Avantages</a>
        <a href="contact.html">Contact</a>
        <a href="decouverte.html">Découverte</a>
    </nav>
</header>

<section class="commandes">
    <h1>Commandes Groupées</h1>
    <p>Retrouvez ici toutes les ventes groupées organisées par le CSE.</p>

    <div id="commandes-container" class="commandes-grid"></div>
</section>

<footer>
    <p>CSE Marie Surgelé 79 — © 2024</p>
</footer>

<script>
    fetch("commandes.json")
        .then(response => response.json())
        .then(data => {
            const container = document.getElementById("commandes-container");

            data.forEach(item => {
                const card = document.createElement("div");
                card.classList.add("commande-card");

                card.innerHTML = `
                    <img src="${item.image}" alt="${item.prestataire}">
                    <h3>${item.prestataire}</h3>
                    <p>${item.description}</p>
                    <p class="periode"><strong>Période :</strong> ${item.periode}</p>
                    <a class="btn" href="${item.lien}" target="_blank">Voir le site</a>
                `;

                container.appendChild(card);
            });
        });
</script>

</body>
</html>
